<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Asset & Synthesis Viewer</title>
<style>
  body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
  .card { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; text-align: center; }
  img { max-width: 100%; max-height: 700px; object-fit: contain; background: #2a2a2a; border-radius: 4px; }
  h3 { margin-top: 0; color: #4fc3f7; }
  .highlight { border: 2px solid #4fc3f7; background: #25333f; }
</style>
</head>
<body>
  <h2>Natural Synthesis Viewer - Blandu Project</h2>
  <div class="grid">
    <div class="card highlight">
      <h3>test_natural.jpg (New Proportional & Layered Output)</h3>
      <img src="output/hybrid/test_natural.jpg">
    </div>
    <div class="card">
      <h3>마네킨 컷2 (Original)</h3>
      <img src="input/raw_photos/마네킨 컷2.png">
    </div>
    <div class="card">
      <h3>ITEM-001 (상의)</h3>
      <img src="input/raw_photos/ITEM-001.png">
    </div>
    <div class="card">
      <h3>ITEM-002 (하의)</h3>
      <img src="input/raw_photos/ITEM-002.png">
    </div>
  </div>
</body>
</html>
