# IDM-VTON LoRA 파인튜닝 설정
# 마네킹 특화 (표준 마네킹 체형, 스튜디오 배경)

# ── 모델 ──────────────────────────────────────────
model:
  base_model: "yisol/IDM-VTON"
  revision: null                      # 특정 커밋 고정 시 사용

# ── LoRA ─────────────────────────────────────────
lora:
  rank: 16                            # r=16 (품질↔ 파라미터 트레이드오프)
  alpha: 16                           # alpha = rank (스케일=1)
  dropout: 0.05
  # 적용 대상 레이어 (UNet attention 레이어)
  target_modules:
    - "to_q"
    - "to_k"
    - "to_v"
    - "to_out.0"
    - "add_k_proj"
    - "add_v_proj"

# ── 학습 데이터 ───────────────────────────────────
data:
  dataset_dir: "finetune/dataset"
  image_size: [768, 1024]
  # 데이터 증강
  augmentation:
    horizontal_flip: false            # 의류 비대칭 보존
    color_jitter:
      brightness: 0.1
      contrast: 0.1
      saturation: 0.05
    random_crop: false                # 포즈 정합 관계 유지

# ── 학습 하이퍼파라미터 ───────────────────────────
training:
  output_dir: "finetune/output"
  num_epochs: 20
  batch_size: 1                       # GPU VRAM 12GB 기준
  gradient_accumulation_steps: 4      # 유효 배치=4
  learning_rate: 1.0e-4
  lr_scheduler: "cosine"
  lr_warmup_steps: 100
  mixed_precision: "fp16"             # "bf16" (A100 이상) 또는 "fp16"
  gradient_checkpointing: true
  max_grad_norm: 1.0
  seed: 42

  # 검증·저장
  validation_steps: 200
  save_steps: 500
  save_total_limit: 3                 # 최신 3개 체크포인트만 유지

# ── 노이즈 스케줄러 ───────────────────────────────
noise_scheduler:
  type: "DDPMScheduler"
  num_train_timesteps: 1000
  beta_schedule: "scaled_linear"
  prediction_type: "epsilon"

# ── 손실 함수 ─────────────────────────────────────
loss:
  reconstruction: 1.0                 # 기본 diffusion loss
  garment_consistency: 0.3            # 의류 디테일 보존 보조 손실
  fit_alignment: 0.1                  # 핏 파라미터 정합 손실 (실험적)

# ── 로깅 ─────────────────────────────────────────
logging:
  report_to: "tensorboard"           # "wandb" 또는 "tensorboard"
  log_dir: "finetune/logs"
  log_steps: 50
